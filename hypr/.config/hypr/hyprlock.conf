# ============================================================
# hyprlock.conf — gruvbox dark, photosensitive-friendly
# Modern · Minimal · Functional · Feature-rich without bloat
# Consistent with full gruvbox system:
#   hyprland: active_border #504945→#d79921, bg #1d2021
#   waybar:   surface #3c3836, amber #d79921
#   kitty:    font Iosevka, fg #d5c4a1
# ============================================================

# ── Gruvbox palette (rgba format for hyprlock) ───────────────
# bg0_hard  rgba(29,32,33,1.0)      #1d2021
# bg1       rgba(60,56,54,1.0)      #3c3836
# bg2       rgba(80,73,69,1.0)      #504945
# bg3       rgba(102,92,84,1.0)     #665c54
# fg0       rgba(213,196,161,1.0)   #d5c4a1
# fg1       rgba(168,153,132,1.0)   #a89984
# fg2       rgba(146,131,116,1.0)   #928374
# amber     rgba(215,153,33,1.0)    #d79921
# amberDim  rgba(181,118,20,1.0)    #b57614
# red       rgba(204,36,29,1.0)     #cc241d
# blue      rgba(69,133,136,1.0)    #458588
# aqua      rgba(104,157,106,1.0)   #689d6a
# green     rgba(142,192,124,1.0)   #8ec07c

$font = Iosevka

# ── General ──────────────────────────────────────────────────
general {
    hide_cursor = true
    # Grace period before requiring password after locking
    # 0 = always require, adjust if you want a brief grace window
    grace = 0
    # No immediate render — wait for resources so image loads clean
    immediate_render = false
    # Ignore empty password input (prevents accidental unlock)
    ignore_empty_input = true
}

# ── Animations ───────────────────────────────────────────────
# Consistent with hyprland animation config:
# easeOutCubic for fades, softOvershoot feel for elements
animations {
    enabled = true
    bezier = easeOutCubic, 0.33, 1, 0.68, 1
    bezier = almostLinear, 0.5, 0.5, 0.75, 1

    # Smooth fade in — no jarring flash on lock
    # Photosensitive safe: long duration, cubic ease
    animation = fadeIn,  1, 10, easeOutCubic
    animation = fadeOut, 1, 10, easeOutCubic

    # Input field dots animate smoothly
    animation = inputFieldDots, 1, 4, easeOutCubic
}

# ── Background ───────────────────────────────────────────────
background {
    monitor =
    # Your wallpaper — preserved from original config
    path = /home/seren/Pictures/wallpapers/wallhaven-qz8w55.png

    # Very subtle blur — enough to push focus to the lock UI
    # without heavy GPU cost or jarring visual effect
    # 0 = no blur, increase to 2-3 for more depth
    blur_passes = 1
    blur_size = 4

    # Slight dim overlay — reduces brightness for photosensitivity
    # bg0_hard at 60% opacity darkens the wallpaper warmly
    color = rgba(29, 32, 33, 0.0)

    # Vignette — darkens edges, draws eye to center UI
    # Subtle warm darkening, no harsh ring
    brightness = 0.7
    contrast = 0.9
    vibrancy = 0.05
    vibrancy_darkness = 0.2
}

# ============================================================
# LAYOUT — asymmetric, left-aligned clock, centered auth
# Clock + date anchored top-left like a terminal header
# Auth panel centered — clean separation of info vs action
# ============================================================

# ── Ambient panel behind clock — subtle dark surface ─────────
# Gives the clock area a grounded feel without a hard box
shape {
    monitor =
    size = 420, 130
    color = rgba(29, 32, 33, 0.55)
    rounding = 0
    border_size = 0
    position = 20, -20
    halign = left
    valign = top
    zindex = 1
}

# ── Amber accent line — top-left, mirrors waybar style ───────
shape {
    monitor =
    size = 420, 2
    color = rgba(215, 153, 33, 0.85)
    rounding = 0
    border_size = 0
    position = 20, -20
    halign = left
    valign = top
    zindex = 2
}

# ── Time — large, left-aligned ───────────────────────────────
label {
    monitor =
    text = $TIME
    color = rgba(213, 196, 161, 0.92)
    font_size = 72
    font_family = $font Light
    position = 32, -28
    halign = left
    valign = top
    zindex = 3

    shadow_passes = 2
    shadow_size = 4
    shadow_color = rgba(29, 32, 33, 0.6)
    shadow_boost = 1.0
}

# ── Date — below time, dimmer ─────────────────────────────────
label {
    monitor =
    text = cmd[update:43200000] echo "$(date +"%A, %d %B %Y")"
    color = rgba(146, 131, 116, 0.85)
    font_size = 13
    font_family = $font
    # Letter spacing via pango
    text_align = left
    position = 34, -112
    halign = left
    valign = top
    zindex = 3
}

# ── System status line — subtle info, left-aligned ───────────
# Shows uptime — functional without bloat
label {
    monitor =
    text = cmd[update:60000] echo "up $(uptime -p | sed 's/up //')"
    color = rgba(102, 92, 84, 0.75)
    font_size = 10
    font_family = $font
    position = 34, -133
    halign = left
    valign = top
    zindex = 3
}

# ── Auth panel background — center stage ─────────────────────
# dark1 surface — same as waybar background
shape {
    monitor =
    size = 340, 180
    color = rgba(60, 56, 54, 0.80)
    rounding = 0
    border_size = 2
    border_color = rgba(80, 73, 69, 0.90)
    position = 0, 0
    halign = center
    valign = center
    zindex = 1
}

# Amber top accent — mirrors hyprland active_border
shape {
    monitor =
    size = 340, 2
    color = rgba(215, 153, 33, 0.90)
    rounding = 0
    border_size = 0
    position = 0, 90
    halign = center
    valign = center
    zindex = 2
}

# ── User label — inside auth panel ───────────────────────────
label {
    monitor =
    text =  $USER
    color = rgba(215, 153, 33, 0.90)
    font_size = 12
    font_family = $font Bold
    position = 0, 54
    halign = center
    valign = center
    zindex = 3
}

# ── Input field ───────────────────────────────────────────────
input-field {
    monitor =
    size = 300, 42

    # Border — 2px matches hyprland border_size
    outline_thickness = 2

    # Password dots — small, centered, clean
    dots_size = 0.22
    dots_spacing = 0.25
    dots_center = true
    dots_rounding = -1

    # Colors — gruvbox surfaces
    # Inner: dark0_hard — one step darker than panel
    inner_color = rgba(29, 32, 33, 0.95)
    # Outer idle: dim border matching inactive_border
    outer_color = rgba(80, 73, 69, 1.0)
    font_color = rgba(213, 196, 161, 1.0)

    # Fade empty field — clean when not typing
    fade_on_empty = true
    fade_timeout = 3000

    font_family = $font
    font_size = 13

    # Placeholder — dim, italic
    placeholder_text = <i><span foreground="##928374">authenticate...</span></i>

    # Typing indicator — amber, matches active accent
    check_color = rgba(215, 153, 33, 1.0)

    # Fail — muted brick red, not alarming flash
    fail_color = rgba(204, 36, 29, 1.0)
    fail_text = <i><span foreground="##cc241d">$FAIL ($ATTEMPTS)</span></i>
    fail_timeout = 2000
    fail_transition = 300

    # Caps lock — orange warning, readable
    capslock_color = rgba(214, 93, 14, 1.0)

    # Rounding — 0 matches system-wide no-rounding principle
    rounding = 0

    position = 0, 10
    halign = center
    valign = center
    zindex = 3
}

# ── Keyboard layout indicator ─────────────────────────────────
# Only shows non-default layouts — hidden when using default
label {
    monitor =
    text = $LAYOUT[!]
    color = rgba(102, 92, 84, 0.80)
    font_size = 10
    font_family = $font
    position = 0, -52
    halign = center
    valign = center
    zindex = 3
}

# ── Lock icon — bottom of auth panel ─────────────────────────
label {
    monitor =
    text = 󰌾
    color = rgba(102, 92, 84, 0.50)
    font_size = 14
    font_family = $font
    position = 0, -72
    halign = center
    valign = center
    zindex = 3
}
