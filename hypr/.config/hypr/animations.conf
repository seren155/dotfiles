#####################
### LOOK AND FEEL ###
#####################

# Refer to https://wiki.hypr.land/Configuring/Variables/

# https://wiki.hypr.land/Configuring/Variables/#general
general {
    gaps_in = 2
    gaps_out = 7

    # https://wiki.hypr.land/Configuring/Variables/#variable-types for info about colors
    col.active_border = rgb(504945) rgb(d79921) 90deg
    col.inactive_border = rgba(3c3836aa)
    col.nogroup_border = rgba(1d2021dd)
    col.nogroup_border_active = rgb(d79921) rgb(504945) 90deg
    border_size = 2
    resize_on_border = false

    # Please see https://wiki.hypr.land/Configuring/Tearing/ before you turn this on
    allow_tearing = false

    layout = dwindle
}

cursor {
    no_hardware_cursors = true
    enable_hyprcursor = true
}

# https://wiki.hypr.land/Configuring/Variables/#decoration
decoration {
#    rounding = 10
#    rounding_power = 2

    # Change transparency of focused and unfocused windows
    active_opacity = 1.0
    inactive_opacity = 0.95

    shadow {
        enabled = true
        range = 60
        offset = 1 2
        scale = 0.97
        render_power = 3

        # gruvbox dark0_hard shadow — warm, not cold blue-black
        color = rgba(1d202166)
    }

    # https://wiki.hypr.land/Configuring/Variables/#blur
    blur {
        enabled = true
        size = 3
        passes = 1

        # Toned down contrast and vibrancy — easier on photosensitive eyes
        brightness = 0.65
        contrast = 1.05
        vibrancy = 0.1
        vibrancy_darkness = 0.3
    }
}

group {
    groupbar {
        # Active: amber gradient matching active border
        col.active = rgb(d79921) rgb(504945) 90deg
        # Inactive: dark warm brown, nearly invisible
        col.inactive = rgba(3c3836dd)
    }
}

# https://wiki.hypr.land/Configuring/Variables/#animations
animations {
    enabled = yes, please :)

    # ─── Bezier Curves ────────────────────────────────────────────────────────
    #        NAME,              X0,   Y0,   X1,   Y1
    bezier = easeOutQuint,      0.23, 1,    0.32, 1
    bezier = easeInOutCubic,    0.65, 0.05, 0.36, 1
    bezier = easeOutCubic,      0.33, 1,    0.68, 1
    bezier = linear,            0,    0,    1,    1
    bezier = almostLinear,      0.5,  0.5,  0.75, 1
    bezier = quick,             0.15, 0,    0.1,  1
    # Soft overshoot — gentle elastic feel without bouncing hard
    bezier = softOvershoot,     0.34, 1.2,  0.64, 1

    # ─── Global ───────────────────────────────────────────────────────────────
    #           NAME,          ONOFF, SPEED, CURVE,          [STYLE]
    animation = global,        1,     10,    default

    # ─── Border ───────────────────────────────────────────────────────────────
    # Slow rotating gradient — subtle, not flashy
    animation = border,        1,     8,     easeOutQuint
    animation = borderangle,   1,     80,    linear,         once

    # ─── Windows ──────────────────────────────────────────────────────────────
    # Slightly slower open for smoothness, quick close to not delay workflow
    animation = windows,       1,     4.5,   easeOutQuint
    animation = windowsIn,     1,     4.2,   softOvershoot,  popin 85%
    animation = windowsOut,    1,     2.8,   easeOutCubic,   popin 85%

    # ─── Fade ─────────────────────────────────────────────────────────────────
    animation = fadeIn,        1,     2.0,   almostLinear
    animation = fadeOut,       1,     2.0,   almostLinear
    animation = fade,          1,     3.0,   quick

    # ─── Layers (waybar, rofi, etc.) ──────────────────────────────────────────
    animation = layers,        1,     3.5,   easeOutQuint
    animation = layersIn,      1,     3.8,   easeOutQuint,   fade
    animation = layersOut,     1,     2.0,   easeOutCubic,   fade
    animation = fadeLayersIn,  1,     2.0,   almostLinear
    animation = fadeLayersOut, 1,     1.6,   almostLinear

    # ─── Workspaces ───────────────────────────────────────────────────────────
    animation = workspaces,    1,     2.2,   easeInOutCubic, slidefade 15%
    animation = workspacesIn,  1,     2.2,   easeInOutCubic, slidefade 15%
    animation = workspacesOut, 1,     1.8,   easeOutCubic,   slidefade 15%

    # ─── Zoom ─────────────────────────────────────────────────────────────────
    animation = zoomFactor,    1,     4.5,   easeOutCubic
}

