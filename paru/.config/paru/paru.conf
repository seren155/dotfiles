# ============================================================
# paru.conf
# ~/.config/paru/paru.conf
# See: man paru.conf
# ============================================================

[options]

# ── Search display ────────────────────────────────────────────
# Results printed bottom to top — most relevant at prompt, like yay
BottomUp

# Sort by votes — most trusted packages first
SortBy = votes
SearchBy = name-desc

# ── AUR behaviour ─────────────────────────────────────────────
# Track -git/-svn etc. packages and only upgrade on new commits
Devel

# Devel package suffixes to track
DevelSuffixes = -git -cvs -svn -bzr -darcs -always -hg

# Resolve conflicts using Provides field
Provides

# Prompt to import unknown PGP keys from PKGBUILD validpgpkeys
PgpFetch

# ── Upgrade ───────────────────────────────────────────────────
# Show combined repo + AUR upgrade menu before building
# Lets you review everything before committing
UpgradeMenu

# Print new Arch news during sysupgrade
NewsOnUpgrade

# Queue all builds then install at once — build unattended after review
BatchInstall

# ── Build ─────────────────────────────────────────────────────
# Remove make dependencies after install — keeps system lean
# Comment out if you frequently rebuild packages
RemoveMake

# Clean src/ and pkg/ dirs after building
CleanAfter

# Always re-download PKGBUILDs of targets (not all) for freshness
Redownload = yes

# ── Misc ──────────────────────────────────────────────────────
# Keep sudo alive between operations — no repeated password prompts
SudoLoop

# ── Binary section ────────────────────────────────────────────
# Editor for PKGBUILD review is read from $EDITOR env var —
# set in ~/.config/fish/config.fish as: set -gx EDITOR nvim
#
# bat is auto-detected for syntax highlighting if installed.
# Pass gruvbox theme via shell alias or MANPAGER — not here.
[bin]

# Uncomment to use yazi/ranger for file-based PKGBUILD review:
# FileManager = yazi

# Extra makepkg flags — parallel compression for faster builds
MFlags = --skippgpcheck FileManager = yaziimit = 20
