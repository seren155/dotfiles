# ╔══════════════════════════════════════════════════════╗
# ║              kitty.conf — gruvbox theme              ║
# ║         photosensitive-friendly warm palette         ║
# ╚══════════════════════════════════════════════════════╝

# =============================================================
# FONT
# =============================================================

font_family      Iosevka
bold_font        Iosevka Bold
italic_font      Iosevka Italic
bold_italic_font Iosevka Bold Italic
font_size        13.0

# Ligatures — requires Iosevka (supports them natively)
font_features Iosevka +liga +calt +dlig

# =============================================================
# WINDOW
# =============================================================

window_padding_width        4
placement_strategy          center
hide_window_decorations     yes
remember_window_size        yes
resize_debounce_time        0.1

# Subtle warm gruvbox border on active window
active_border_color         #d79921
inactive_border_color       #3c3836
bell_border_color           #cc241d

# =============================================================
# CURSOR
# =============================================================

cursor                  #d5c4a1
cursor_text_color       #1d2021
cursor_shape            block
cursor_blink_interval   0
# Blinking disabled — reduces visual noise, good for photosensitivity

# =============================================================
# SCROLLBACK
# =============================================================

scrollback_lines        10000
scrollback_pager        less --chop-long-lines --RAW-CONTROL-CHARS +INPUT_LINE_NUMBER

# =============================================================
# MOUSE
# =============================================================

mouse_hide_wait         3.0
click_interval          0.5
focus_follows_mouse     yes
pointer_shape_when_grabbed arrow

# Copy on select
copy_on_select          yes

# =============================================================
# URL DETECTION
# =============================================================

url_color               #8ec07c
url_style               curly
# Opens URLs with your default xdg handler
open_url_with           default
detect_urls             yes
url_excluded_characters

# =============================================================
# IMAGE RENDERING
# =============================================================

# Kitty native image protocol — use `kitty +kitten icat <image>` to render
# Compatible with: ranger, viu, chafa, and most modern TUIs
allow_hyperlinks        yes

# =============================================================
# TAB BAR
# =============================================================

tab_bar_edge                bottom
tab_bar_style               powerline
tab_powerline_style         slanted
tab_bar_min_tabs            1
tab_bar_margin_width        0
tab_bar_margin_height       4.0 0.0

tab_title_template          " {index}: {title} "
active_tab_title_template   " {index}: {title} "

# Gruvbox tab bar colors
active_tab_foreground       #1d2021
active_tab_background       #d79921
active_tab_font_style       bold
inactive_tab_foreground     #928374
inactive_tab_background     #3c3836
inactive_tab_font_style     normal
tab_bar_background          #1d2021
tab_bar_margin_color        #1d2021

# =============================================================
# GRUVBOX COLOR SCHEME
# Warm, muted — all neutral tier, no bright tier
# =============================================================

# Background & foreground
background              #1d2021
foreground              #d5c4a1

# Selection — low contrast, no harsh invert
selection_background    #504945
selection_foreground    #d5c4a1

# Black
color0                  #1d2021
color8                  #665c54

# Red (muted brick, not alarming)
color1                  #cc241d
color9                  #9d0006

# Green
color2                  #98971a
color10                 #79740e

# Yellow / Amber
color3                  #d79921
color11                 #b57614

# Blue (steel, not electric)
color4                  #458588
color12                 #076678

# Magenta (dusty mauve)
color5                  #b16286
color13                 #8f3f71

# Cyan / Aqua
color6                  #689d6a
color14                 #427b58

# White (warm gray, not stark)
color7                  #a89984
color15                 #928374

# =============================================================
# KEYBOARD SHORTCUTS
# =============================================================

# Tabs
map ctrl+shift+t        new_tab_with_cwd
map ctrl+shift+w        close_tab
map ctrl+shift+right    next_tab
map ctrl+shift+left     previous_tab
map ctrl+shift+alt+t    set_tab_title

# Windows / splits
map ctrl+shift+enter    new_window_with_cwd
map ctrl+shift+]        next_window
map ctrl+shift+[        previous_window

# Font size
map ctrl+equal          change_font_size all +1.0
map ctrl+minus          change_font_size all -1.0
map ctrl+0              change_font_size all 0

# Scrollback
map ctrl+shift+h        show_scrollback
map ctrl+shift+g        show_last_command_output

# URL hint mode — keyboard-driven URL opening
map ctrl+shift+u        open_url_with_hints

# =============================================================
# PERFORMANCE
# =============================================================

repaint_delay       10
input_delay         3
sync_to_monitor     yes
